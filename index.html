<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Verse | Secure Your Spot</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#5C8DF6', /* Tech Blue from Poster */
                        dark: '#03040a', /* Deep Navy/Black */
                        surface: 'rgba(255, 255, 255, 0.03)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- GSAP for Entrance Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body {
            background-color: #03040a;
            color: #fff;
            /* Matches the deep indigo radial glow from the reference poster background */
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(50, 65, 140, 0.35), transparent 55%),
                radial-gradient(circle at 0% 0%, rgba(80, 100, 220, 0.15), transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Custom Dropdown Styling for Dark Mode */
        select option {
            background-color: #0a0b15;
            color: #fff;
        }

        /* Input Autocomplete override for WebKit */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #0a0b15 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* Subtle Glow Animation for the border */
        @keyframes spin-slow {
            100% { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 4s linear infinite;
        }

        /* 3D Input Fields */
        .input-3d {
            background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(20,25,40,0.3) 100%);
            border: 1px solid rgba(255,255,255,0.03);
            border-top: 1px solid rgba(0,0,0,0.8);
            border-left: 1px solid rgba(0,0,0,0.8);
            box-shadow: 
                inset 4px 4px 10px rgba(0,0,0,0.8), 
                inset -3px -3px 8px rgba(255,255,255,0.05),
                0 1px 1px rgba(255,255,255,0.1); /* Subtle outer bottom lip */
            transition: all 0.3s ease;
        }
        .input-3d:focus {
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(15,20,35,0.5) 100%);
            border-color: theme('colors.accent');
            border-top-color: theme('colors.accent');
            border-left-color: theme('colors.accent');
            box-shadow: 
                inset 4px 4px 10px rgba(0,0,0,0.8), 
                inset -3px -3px 8px rgba(255,255,255,0.05),
                0 0 15px rgba(92, 141, 246, 0.25);
            outline: none;
        }
    </style>
</head>
<body class="p-6 py-12">

    <!-- Card Wrapper -->
    <div class="card-container relative w-full max-w-2xl mx-auto opacity-0 translate-y-8">
        
        <!-- Animated Glowing Border Setup -->
        <div class="relative rounded-3xl p-[1px] overflow-hidden group shadow-[0_0_40px_rgba(92,141,246,0.1)] hover:shadow-[0_0_60px_rgba(92,141,246,0.25)] transition-shadow duration-500">
            
            <!-- Rotating Conic Gradient (Purple to Tech Blue matching video/logo) -->
            <div class="absolute inset-0 bg-[conic-gradient(from_0deg,transparent_40%,#8A2BE2_75%,#5C8DF6_100%)] animate-spin-slow opacity-80 group-hover:opacity-100 transition-opacity duration-300"></div>
            
            <!-- Glassmorphic Inner Card -->
            <div class="relative bg-black/50 backdrop-blur-2xl rounded-[23px] h-full w-full p-8 md:p-10 border border-white/5 z-10">
                
                <!-- Header -->
                <div class="text-center mb-10 form-element">
                    <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-accent/10 border border-accent/20 mb-4 shadow-[0_0_15px_rgba(92,141,246,0.3)]">
                        <i class="fa-solid fa-robot text-accent text-xl"></i>
                    </div>
                    <!-- Logo matching vertical gradient -->
                    <h2 class="font-display text-4xl md:text-5xl font-bold tracking-tight mb-2 text-transparent bg-clip-text bg-gradient-to-b from-[#A6C4FF] via-[#5C8DF6] to-[#2B57C4]">TRACK VERSE</h2>
                    <p class="text-white/50 text-sm tracking-widest uppercase mt-1">Official Registration Portal</p>
                </div>

                <!-- Form -->
                <form id="trackverse-reg" class="space-y-6">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        
                        <!-- Team Name -->
                        <div class="relative form-element md:col-span-2">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-user-astronaut text-white/40"></i>
                            </div>
                            <input type="text" id="teamName" required class="w-full input-3d rounded-xl py-3 pl-11 pr-4 text-white placeholder-white/30" placeholder="Team Name">
                        </div>

                        <!-- Contact Number -->
                        <div class="relative form-element md:col-span-2">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-phone text-white/40"></i>
                            </div>
                            <input type="tel" required class="w-full input-3d rounded-xl py-3 pl-11 pr-4 text-white placeholder-white/30" placeholder="Contact Number (Primary)">
                        </div>

                        <!-- Dynamic Team Members Section (Unified Slot) -->
                        <div class="md:col-span-2 form-element space-y-3" id="members-area">
                            <label class="block text-xs uppercase tracking-widest text-white/50 mb-1 ml-1 font-semibold">
                                <i class="fa-solid fa-users text-accent mr-1"></i> Team Members (Max 4)
                            </label>
                            
                            <!-- Initial 1st Member / Leader slot -->
                            <div class="flex items-center gap-3">
                                <div class="relative flex-grow">
                                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                        <i class="fa-solid fa-medal text-white/40"></i>
                                    </div>
                                    <input type="text" required class="w-full input-3d rounded-xl py-3 pl-11 pr-4 text-white placeholder-white/30" placeholder="Team Leader / Member 1">
                                </div>
                                <!-- Add Member Button -->
                                <button type="button" id="add-member" class="w-12 h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-accent/10 border border-accent/30 text-accent hover:bg-accent/20 hover:shadow-[0_0_15px_rgba(0,170,255,0.4)] transition-all">
                                    <i class="fa-solid fa-plus text-lg"></i>
                                </button>
                            </div>
                            
                            <!-- Placeholder where new member slots will appear -->
                            <div id="additional-members" class="space-y-3"></div>
                        </div>

                        <!-- Branch -->
                        <div class="relative form-element">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-code-branch text-white/40"></i>
                            </div>
                            <input type="text" required class="w-full input-3d rounded-xl py-3 pl-11 pr-4 text-white placeholder-white/30" placeholder="Branch / Department">
                        </div>

                        <!-- Academic Year -->
                        <div class="relative form-element">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-graduation-cap text-white/40"></i>
                            </div>
                            <select required class="w-full input-3d rounded-xl py-3 pl-11 pr-10 text-white appearance-none cursor-pointer">
                                <option value="" disabled selected class="text-white/30">Select Academic Year</option>
                                <option value="1">First Year</option>
                                <option value="2">Second Year</option>
                                <option value="3">Third Year</option>
                                <option value="4">Fourth Year</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-chevron-down text-white/40 text-xs"></i>
                            </div>
                        </div>

                    </div>

                    <!-- Hardware Selection -->
                    <div class="pt-4 form-element">
                        <label class="block text-xs uppercase tracking-widest text-white/50 mb-3 ml-1 font-semibold">Hardware Setup</label>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            
                            <!-- Option 1: Full Kit -->
                            <label class="cursor-pointer group">
                                <input type="radio" name="hardware" value="full" class="peer sr-only" checked>
                                <div class="h-full border border-white/10 bg-surface rounded-xl p-4 peer-checked:border-accent peer-checked:bg-accent/10 hover:border-white/30 transition-all text-center flex flex-col items-center justify-center gap-2">
                                    <i class="fa-solid fa-microchip text-xl text-white/60 peer-checked:text-accent group-hover:text-white transition-colors"></i>
                                    <div>
                                        <div class="font-bold text-sm text-white peer-checked:text-accent">Full Robo Kit</div>
                                        <div class="text-[10px] text-white/40 mt-0.5 uppercase tracking-wider">Provided</div>
                                    </div>
                                </div>
                            </label>

                            <!-- Option 2: Parts -->
                            <label class="cursor-pointer group">
                                <input type="radio" name="hardware" value="parts" class="peer sr-only">
                                <div class="h-full border border-white/10 bg-surface rounded-xl p-4 peer-checked:border-accent peer-checked:bg-accent/10 hover:border-white/30 transition-all text-center flex flex-col items-center justify-center gap-2">
                                    <i class="fa-solid fa-cubes text-xl text-white/60 peer-checked:text-accent group-hover:text-white transition-colors"></i>
                                    <div>
                                        <div class="font-bold text-sm text-white peer-checked:text-accent">Robo Parts</div>
                                        <div class="text-[10px] text-white/40 mt-0.5 uppercase tracking-wider">Modular</div>
                                    </div>
                                </div>
                            </label>

                            <!-- Option 3: Custom Build -->
                            <label class="cursor-pointer group">
                                <input type="radio" name="hardware" value="custom" class="peer sr-only">
                                <div class="h-full border border-white/10 bg-surface rounded-xl p-4 peer-checked:border-accent peer-checked:bg-accent/10 hover:border-white/30 transition-all text-center flex flex-col items-center justify-center gap-2">
                                    <i class="fa-solid fa-wrench text-xl text-white/60 peer-checked:text-accent group-hover:text-white transition-colors"></i>
                                    <div>
                                        <div class="font-bold text-sm text-white peer-checked:text-accent">Custom Build</div>
                                        <div class="text-[10px] text-white/40 mt-0.5 uppercase tracking-wider">Own Parts</div>
                                    </div>
                                </div>
                            </label>

                        </div>
                    </div>

                    <!-- Footer Action Area -->
                    <div class="mt-8 pt-6 border-t border-white/10 flex flex-col sm:flex-row items-center justify-between gap-6 form-element">
                        
                        <!-- Fee Display -->
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                                <i class="fa-solid fa-ticket text-white/60"></i>
                            </div>
                            <div>
                                <p class="text-xs text-white/
